# Canonical port map (host -> container)
# | Service               | Env var                         | Default local | Docker compose |
# |-----------------------|----------------------------------|---------------|----------------|
# | discord-hub           | HUB_HTTP_ADDR                    | 127.0.0.1:8080 | 8080:8080     |
# | beeminder-spoke       | BEEMINDER_SPOKE_HTTP_ADDR        | 127.0.0.1:8090 | 8090:8090     |
# | finance-spoke         | FINANCE_SPOKE_HTTP_ADDR          | 127.0.0.1:8091 | 8091:8091     |
# | kalshi-spoke          | KALSHI_SPOKE_HTTP_ADDR           | 127.0.0.1:8092 | 8092:8092     |
# | accountability-spoke* | ACCOUNTABILITY_SPOKE_HTTP_ADDR   | 127.0.0.1:8093 | n/a           |
# *accountability-spoke is not yet included in this compose file.

services:
  discord-hub:
    build:
      context: ..
      dockerfile: cmd/discord-hub/Dockerfile
    env_file:
      - ../.env
    environment:
      HUB_HTTP_ADDR: 0.0.0.0:8080
      HUB_NOTIFY_AUTH_TOKEN: ${HUB_NOTIFY_AUTH_TOKEN}
      SPOKE_COMMAND_SERVICES: >-
        [{"name":"beeminder-spoke","commandsUrl":"http://beeminder-spoke:8090/control/commands","executeUrl":"http://beeminder-spoke:8090/control/command"},{"name":"finance-spoke","commandsUrl":"http://finance-spoke:8091/control/commands","executeUrl":"http://finance-spoke:8091/control/command"},{"name":"kalshi-spoke","commandsUrl":"http://kalshi-spoke:8092/control/commands","executeUrl":"http://kalshi-spoke:8092/control/command"}]
    depends_on:
      - beeminder-spoke
      - finance-spoke
      - kalshi-spoke
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - personal-infra

  beeminder-spoke:
    build:
      context: ..
      dockerfile: cmd/beeminder-spoke/Dockerfile
    env_file:
      - ../.env
    environment:
      BEEMINDER_SPOKE_HTTP_ADDR: 0.0.0.0:8090
      DISCORD_HUB_NOTIFY_URL: http://discord-hub:8080/notify
      DISCORD_HUB_NOTIFY_AUTH_TOKEN: ${HUB_NOTIFY_AUTH_TOKEN}
    ports:
      - "8090:8090"
    restart: unless-stopped
    networks:
      - personal-infra

  finance-spoke:
    build:
      context: ..
      dockerfile: cmd/finance-spoke/Dockerfile
    env_file:
      - ../.env
    environment:
      FINANCE_SPOKE_HTTP_ADDR: 0.0.0.0:8091
      FINANCE_HUB_NOTIFY_URL: http://discord-hub:8080/notify
      FINANCE_HUB_NOTIFY_AUTH_TOKEN: ${HUB_NOTIFY_AUTH_TOKEN}
    depends_on:
      - discord-hub
    ports:
      - "8091:8091"
    restart: unless-stopped
    networks:
      - personal-infra

  kalshi-spoke:
    build:
      context: ..
      dockerfile: cmd/kalshi-spoke/Dockerfile
    env_file:
      - ../.env
    environment:
      KALSHI_SPOKE_HTTP_ADDR: 0.0.0.0:8092
      KALSHI_HUB_NOTIFY_URL: http://discord-hub:8080/notify
      KALSHI_HUB_NOTIFY_AUTH_TOKEN: ${HUB_NOTIFY_AUTH_TOKEN}
    depends_on:
      - discord-hub
    ports:
      - "8092:8092"
    restart: unless-stopped
    networks:
      - personal-infra

networks:
  personal-infra:
    name: personal-infra
