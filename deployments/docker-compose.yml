services:
  discord-hub:
    build:
      context: ..
      dockerfile: cmd/discord-hub/Dockerfile
    env_file:
      - ../.env
    environment:
      HUB_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - personal-infra

networks:
  personal-infra:
    name: personal-infra
